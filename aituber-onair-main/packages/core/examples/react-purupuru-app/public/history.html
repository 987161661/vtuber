<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>凌岚运行历史</title>
    <style>
      body { margin: 0; background: #101116; color: #f4f4f6; font: 14px/1.6 system-ui, sans-serif; }
      header { position: sticky; top: 0; padding: 18px 24px; background: #181a22; border-bottom: 1px solid #303341; }
      h1 { margin: 0; font-size: 20px; } small { color: #9ca3af; }
      main { max-width: 1180px; margin: 0 auto; padding: 20px; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
      input, button, select { border: 1px solid #3b3f50; border-radius: 8px; padding: 9px 12px; background: #20232d; color: inherit; }
      input { flex: 1; } button { cursor: pointer; }
      article { margin: 0 0 12px; padding: 14px 16px; background: #191b23; border: 1px solid #2c2f3a; border-radius: 10px; }
      article.runtime { border-color: #624f2d; }
      .meta { color: #9ca3af; font-size: 12px; margin-bottom: 8px; }
      .viewer { color: #f9a8d4; } .reply { margin-top: 8px; color: #d8e6ff; white-space: pre-wrap; }
      .input { white-space: pre-wrap; } .empty { color: #9ca3af; text-align: center; padding: 80px 0; }
      .health { max-width: 1180px; margin: 8px auto 0; color: #a7f3d0; }
      .warn { color: #fbbf24; }
    </style>
  </head>
  <body>
    <header><h1>凌岚运行历史</h1><small id="summary">正在读取记录……</small><div class="health" id="health"></div></header>
    <main>
      <div class="toolbar">
        <input id="search" placeholder="搜索观众、弹幕或凌岚回答" />
        <select id="filter">
          <option value="all">全部记录</option>
          <option value="duplicate">重复拦截</option>
          <option value="dropped">丢弃/合并</option>
          <option value="fact">事实校验重写</option>
          <option value="unsafe">异常字符</option>
        </select>
        <button id="refresh">刷新</button>
      </div>
      <section id="records"></section>
    </main>
    <script>
      let all = [], runtime = [];
      const records = document.querySelector('#records');
      const summary = document.querySelector('#summary');
      const health = document.querySelector('#health');
      const search = document.querySelector('#search');
      const filter = document.querySelector('#filter');
      const isUnsafe = x => /\[e~\[|\u001b\[[0-?]*[ -/]*[@-~]|<\/?(?:internal|analysis|tool|system)\b/i.test(`${x.input || ''} ${x.reply || ''}`);
      function category(x) {
        if (x.runtimeOnly) {
          if (x.stage === 'deduplicated' && `${x.dropReason}`.startsWith('duplicate')) return 'duplicate';
          if (x.stage === 'dropped' || x.dropReason) return 'dropped';
          if (x.stage === 'fact_validation_rewrite') return 'fact';
          if (x.stage === 'sanitizer_failure') return 'unsafe';
        }
        if (x.dropReason) return `${x.dropReason}`.startsWith('duplicate') ? 'duplicate' : 'dropped';
        return isUnsafe(x) ? 'unsafe' : 'normal';
      }
      function render() {
        const q = search.value.trim().toLowerCase();
        const selected = filter.value;
        const eventRows = runtime
          .filter(x => ['deduplicated', 'dropped', 'fact_validation_rewrite', 'sanitizer_failure'].includes(x.stage))
          .map(x => ({ ...x, runtimeOnly: true, at: x.at, input: x.text || '', reply: '', viewerName: x.viewerName || '', source: 'runtime' }));
        const list = [...all, ...eventRows]
          .filter(x => (selected === 'all' || category(x) === selected) && (!q || `${x.viewerName} ${x.input} ${x.reply} ${x.dropReason || ''}`.toLowerCase().includes(q)))
          .sort((a, b) => Number(b.replyAt || b.at) - Number(a.replyAt || a.at));
        records.replaceChildren();
        summary.textContent = `回答 ${all.length} 条，运行事件 ${runtime.length} 条，当前显示 ${list.length} 条 · 每 5 秒自动刷新`;
        if (!list.length) { const p = document.createElement('p'); p.className = 'empty'; p.textContent = '暂无匹配记录。新互动会自动保存在这里。'; records.append(p); return; }
        for (const item of list) {
          const card = document.createElement('article');
          if (item.runtimeOnly) card.className = 'runtime';
          const meta = document.createElement('div'); meta.className = 'meta';
          const commentAt = Number(item.commentAt) || Number(item.at);
          const receivedAt = Number(item.receivedAt) || 0;
          const processingAt = Number(item.processingAt) || 0;
          const replyAt = Number(item.replyAt) || Number(item.at);
          const phases = [];
          if (receivedAt && commentAt) phases.push(`抓取 ${Math.max(0, (receivedAt - commentAt) / 1000).toFixed(1)}s`);
          const queuedAt = Number(item.queuedAt) || receivedAt;
          const selectedAt = Number(item.selectedAt) || processingAt;
          const llmStartAt = Number(item.llmStartAt) || processingAt;
          const llmEndAt = Number(item.llmEndAt) || replyAt;
          const ttsStartAt = Number(item.ttsStartAt) || 0;
          const ttsEndAt = Number(item.ttsEndAt) || 0;
          if (queuedAt && receivedAt) phases.push(`入队 ${Math.max(0, (queuedAt - receivedAt) / 1000).toFixed(1)}s`);
          if (selectedAt && queuedAt) phases.push(`排队 ${Math.max(0, (selectedAt - queuedAt) / 1000).toFixed(1)}s`);
          if (llmEndAt && llmStartAt) phases.push(`生成 ${Math.max(0, (llmEndAt - llmStartAt) / 1000).toFixed(1)}s`);
          if (ttsEndAt && ttsStartAt) phases.push(`TTS ${Math.max(0, (ttsEndAt - ttsStartAt) / 1000).toFixed(1)}s`);
          meta.textContent = item.runtimeOnly
            ? `运行事件 ${new Date(replyAt).toLocaleString()} · ${item.stage}${item.dropReason ? ` · ${item.dropReason}` : ''} · `
            : `弹幕 ${new Date(commentAt).toLocaleString()} · 回复 ${new Date(replyAt).toLocaleTimeString()} · ${item.source || 'chat'}${phases.length ? ` · ${phases.join(' · ')}` : ''} · `;
          const name = document.createElement('span'); name.className = 'viewer'; name.textContent = item.viewerName || '本地观众'; meta.append(name);
          const input = document.createElement('div'); input.className = 'input'; input.textContent = `观众：${item.input}`;
          const reply = document.createElement('div'); reply.className = 'reply'; reply.textContent = item.runtimeOnly ? `处理：${item.dropReason || item.stage}` : `凌岚：${item.reply}`;
          card.append(meta, input, reply); records.append(card);
        }
      }
      async function load() { try {
        const [data, events, status] = await Promise.all([
          fetch('/api/conversation-history', { cache: 'no-store' }).then(r => r.json()),
          fetch('/api/live-runtime-events?history=1', { cache: 'no-store' }).then(r => r.json()),
          fetch('/api/live-runtime-health', { cache: 'no-store' }).then(r => r.json()),
        ]);
        all = data.records || []; runtime = events.events || [];
        const alerts = status.alerts || [];
        const acceptance = status.acceptance30m || {};
        const p95 = value => value == null ? '无样本' : `${(value / 1000).toFixed(1)}s`;
        health.className = alerts.length ? 'health warn' : 'health';
        health.textContent = `队列 ${status.queueDepth || 0} · 最老等待 ${((status.oldestQueueAgeMs || 0) / 1000).toFixed(1)}s · 重复拦截 ${status.duplicateDrops || 0} · 清洗失败 ${status.sanitizerFailures || 0} · TTS限流 ${status.ttsRateLimitCount || 0} · 30分钟样本 ${acceptance.samples || 0}（抓取P95 ${p95(acceptance.captureP95Ms)}，排队P95 ${p95(acceptance.queueP95Ms)}，可播P95 ${p95(acceptance.playableP95Ms)}）${alerts.length ? ` · 告警：${alerts.join('、')}` : ' · 状态正常'}`;
        render();
      } catch { summary.textContent = '读取失败，请确认后台服务正在运行'; } }
      search.addEventListener('input', render); filter.addEventListener('change', render); document.querySelector('#refresh').addEventListener('click', load);
      load(); setInterval(load, 5000);
    </script>
  </body>
</html>
